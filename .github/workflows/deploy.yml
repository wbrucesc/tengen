name: Deploy Tengen to GitHub Pages

# One-time setup: Repo → Settings → Pages → "Build and deployment" →
# Source: "GitHub Actions". After that, every push here publishes a URL
# you can open on your iPhone.

on:
  push:
    branches: ["claude/mobile-go-game-research-2wnec6", "master", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
